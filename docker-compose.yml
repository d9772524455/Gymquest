services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gymquest}
      POSTGRES_USER: ${POSTGRES_USER:-gymquest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgssl:/etc/postgres-ssl
    ports:
      - "127.0.0.1:5432:5432"
    # Generate a self-signed cert on first boot and enable SSL, because
    # the Node server forces ssl:{} in NODE_ENV=production. Certs live
    # outside the data dir so initdb doesn't see them as "dir not empty".
    command:
      - sh
      - -c
      - |
        set -e
        CRT=/etc/postgres-ssl/server.crt
        KEY=/etc/postgres-ssl/server.key
        if [ ! -f "$$CRT" ]; then
          apk add --no-cache openssl >/dev/null
          openssl req -new -x509 -days 3650 -nodes -text \
            -out "$$CRT" -keyout "$$KEY" -subj '/CN=db' >/dev/null 2>&1
        fi
        chmod 600 "$$KEY"
        chown 70:70 "$$CRT" "$$KEY"
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file="$$CRT" \
          -c ssl_key_file="$$KEY"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gymquest}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymquest}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gymquest}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  pgssl:
