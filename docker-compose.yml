services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gymquest}
      POSTGRES_USER: ${POSTGRES_USER:-gymquest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-ssl:/etc/postgres-ssl:ro
    ports:
      - "127.0.0.1:5432:5432"
    # App forces SSL in NODE_ENV=production (node-pg Pool config).
    # Certs are pre-generated on the host at ./db-ssl/ (gitignored)
    # and bind-mounted into the container.
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/etc/postgres-ssl/server.crt
      - -c
      - ssl_key_file=/etc/postgres-ssl/server.key
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gymquest}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gymquest}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gymquest}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
