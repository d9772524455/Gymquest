# /etc/nginx/sites-available/gymquest
# After setup: sudo certbot --nginx -d gymquest.ru -d www.gymquest.ru

server {
    listen 80;
    server_name gymquest.ru www.gymquest.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gymquest.ru www.gymquest.ru;

    # SSL (certbot will fill these)
    # ssl_certificate /etc/letsencrypt/live/gymquest.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/gymquest.ru/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Client max body (for workout data)
    client_max_body_size 5M;

    # Proxy to Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }

    # Cache static assets
    location /app/ {
        proxy_pass http://127.0.0.1:3000/app/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    location /dashboard/ {
        proxy_pass http://127.0.0.1:3000/dashboard/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
