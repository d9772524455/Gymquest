# Reference nginx config for gymquest.ru
#
# NOTE: The live config is at /etc/nginx/sites-available/gymquest.ru on the VDS.
# This file is a reference snapshot — edit the one on the VDS and reload nginx:
#     sudo nginx -t && sudo systemctl reload nginx
#
# First-time bootstrap (HTTP only):
#     1) Install this file as /etc/nginx/sites-available/gymquest.ru minus the 443 block
#     2) ln -sf ../sites-available/gymquest.ru /etc/nginx/sites-enabled/gymquest.ru
#     3) rm /etc/nginx/sites-enabled/default
#     4) systemctl reload nginx
#
# Then run certbot to add the 443 server + redirect automatically:
#     sudo certbot --nginx --non-interactive --agree-tos --redirect \
#       --email you@domain.tld -d gymquest.ru -d www.gymquest.ru
# certbot edits this file in place and adds ssl_certificate, listen 443 ssl, etc.

# ───── 443 / HTTPS block owned by live server config ─────
#
# The block below describes only the port-80 baseline. The live config at
# /etc/nginx/sites-enabled/gymquest.ru contains an additional `server { listen 443 ssl; ... }`
# block added by certbot. That block MUST include the same security headers below, plus:
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
#   add_header Content-Security-Policy "default-src 'self'; ..." always;
#   add_header Referrer-Policy "strict-origin-when-cross-origin" always;
#
# Verify on VDS:
#   grep -A 20 "listen 443" /etc/nginx/sites-enabled/gymquest.ru
# Reload after edits:
#   sudo nginx -t && sudo systemctl reload nginx
#
# This repo file is a REFERENCE SNAPSHOT, not the source of truth.
# See docs/DEPLOY.md (added in Phase 4b) for the canonical 443 block template.

server {
    listen 80;
    listen [::]:80;
    server_name gymquest.ru www.gymquest.ru;

    client_max_body_size 5M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss;
    gzip_min_length 256;

    # Security headers (served on HTTP until certbot adds 443)
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }

    location /app/ {
        proxy_pass http://127.0.0.1:3000/app/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1h;
        add_header Cache-Control "public";
    }

    location /dashboard/ {
        proxy_pass http://127.0.0.1:3000/dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1h;
        add_header Cache-Control "public";
    }
}
